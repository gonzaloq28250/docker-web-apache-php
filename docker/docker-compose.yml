services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laragon-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "${WWW_PATH:-../www}:/var/www/html"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - TZ=America/Bogota
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
