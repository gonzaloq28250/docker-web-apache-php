$query = "
SELECT F9CallID,
       MAX(CASE WHEN clave = 'PROYECTO' THEN valor END) AS PROYECTO,
       MAX(CASE WHEN clave = 'ANI' THEN valor END) AS ANI,
       MAX(CASE WHEN clave = 'DNIS' THEN valor END) AS DNIS,

       MAX(CASE WHEN clave = 'F911DNIS' THEN valor END) AS F911DNIS,
       MAX(CASE WHEN clave = 'nombre_contacto' THEN valor END) AS nombre_contacto,
       MAX(CASE WHEN clave = 'seguimiento' THEN valor END) AS seguimiento,
       MAX(CASE WHEN clave = 'numero_contacto' THEN valor END) AS numero_contacto
FROM siigo_lead_data_v2
WHERE method = 'Insert Call'
GROUP BY F9CallID
ORDER BY F9TimeStamp DESC
";
